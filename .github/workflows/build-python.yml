name: Build Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            python-version: "3.9"
          - target: x86_64-apple-darwin
            runner: macos-latest
            python-version: "3.9"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: manylinux_2_28
            python-version: "3.9"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: manylinux_2_28
            python-version: "3.9"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            python-version: "3.9"
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/agent-transport-python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          before-script-linux: |
            if command -v dnf &> /dev/null; then
              dnf install -y cmake opus-devel
            else
              apt-get update && apt-get install -y cmake libopus-dev
            fi

      - name: Upload wheels
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: crates/agent-transport-python/dist/*.whl
          retention-days: 1
