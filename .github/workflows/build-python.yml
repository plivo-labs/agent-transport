name: Build Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - '**'
              - '!README.md'
              - '!LICENSE'
              - '!docs/**'
              - '!examples/**'
              - '!.claude/**'

  run-build:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            python-version: "3.9"
          - target: x86_64-apple-darwin
            runner: macos-latest
            python-version: "3.9"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: manylinux_2_28
            python-version: "3.9"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: manylinux_2_28
            python-version: "3.9"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            python-version: "3.9"
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Copy Python adapters into crate
        run: mkdir -p crates/agent-transport-python/python && cp -r python/agent_transport crates/agent-transport-python/python/agent_transport

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/agent-transport-python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          before-script-linux: |
            if command -v dnf &> /dev/null; then
              dnf install -y cmake opus-devel
            else
              apt-get update && apt-get install -y cmake libopus-dev
            fi

      - name: Verify wheel contents
        shell: bash
        run: |
          python${{ matrix.python-version }} -c "
          import zipfile, glob, sys
          wheels = glob.glob('crates/agent-transport-python/dist/*.whl')
          assert wheels, 'No wheel found'
          z = zipfile.ZipFile(wheels[0])
          names = z.namelist()
          required = [
              'agent_transport/__init__.py',
              'agent_transport/sip/__init__.py',
              'agent_transport/sip/livekit/__init__.py',
              'agent_transport/sip/pipecat/__init__.py',
              'agent_transport/audio_stream/__init__.py',
              'agent_transport/audio_stream/livekit/__init__.py',
              'agent_transport/audio_stream/pipecat/__init__.py',
          ]
          missing = [r for r in required if r not in names]
          if missing:
              print('FAIL: missing from wheel:', missing)
              sys.exit(1)
          print(f'OK: wheel contains all adapter subpackages ({len([n for n in names if n.startswith(\"agent_transport/\")])} files)')
          "

      - name: Upload wheels
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: crates/agent-transport-python/dist/*.whl
          retention-days: 1

  build-python:
    if: always()
    needs: [changes, run-build]
    runs-on: ubuntu-latest
    steps:
      - name: Passed
        if: needs.run-build.result == 'success' || needs.run-build.result == 'skipped'
        run: echo "Build passed or skipped (docs-only change)"
      - name: Failed
        if: needs.run-build.result == 'failure' || needs.run-build.result == 'cancelled'
        run: exit 1
