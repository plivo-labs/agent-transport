name: Publish Node SDK

on:
  workflow_run:
    workflows: ["Build Node"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      run-id:
        description: 'Build workflow run ID to publish from'
        required: true

permissions:
  contents: read
  actions: read

jobs:
  check:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      version: ${{ steps.check.outputs.version }}
      run-id: ${{ steps.check.outputs.run-id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check for release label on merged PR
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-publish=true" >> $GITHUB_OUTPUT
            echo "run-id=${{ inputs.run-id }}" >> $GITHUB_OUTPUT
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            LABELS=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
              --jq 'if length > 0 then .[0].labels[].name else empty end' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "release-node-sdk"; then
              echo "should-publish=true" >> $GITHUB_OUTPUT
            else
              echo "should-publish=false" >> $GITHUB_OUTPUT
              echo "No release-node-sdk label found, skipping"
            fi
            echo "run-id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          fi
          VERSION=$(node -p "require('./crates/agent-transport-node/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing agent-transport v$VERSION to npm"

  publish:
    needs: check
    if: needs.check.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: crates/agent-transport-node
        run: bun install

      - name: Download binding artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ needs.check.outputs.run-id }}
          github-token: ${{ github.token }}
          pattern: bindings-*
          path: crates/agent-transport-node
          merge-multiple: true

      - name: Move artifacts to platform package dirs
        working-directory: crates/agent-transport-node
        run: |
          for file in agent-transport.*.node; do
            platform="${file%.node}"
            platform="${platform#agent-transport.}"
            if [ -d "npm/${platform}" ]; then
              cp "$file" "npm/${platform}/"
              echo "Placed $file -> npm/${platform}/"
            fi
          done

      - name: Build LiveKit adapter
        working-directory: node/agent-transport-livekit
        run: |
          npm install
          npm run build
          cp -r dist ../../crates/agent-transport-node/livekit

      - name: Copy root README into package
        run: cp README.md crates/agent-transport-node/README.md

      - name: Prepare and publish packages
        working-directory: crates/agent-transport-node
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bunx napi prepublish --no-gh-release
          npm publish --access public
