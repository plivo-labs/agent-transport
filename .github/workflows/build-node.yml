name: Build Node

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - '**'
              - '!README.md'
              - '!LICENSE'
              - '!docs/**'
              - '!examples/**'
              - '!.claude/**'

  run-build:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: crates/agent-transport-node
        run: bun install

      - name: Build native package
        working-directory: crates/agent-transport-node
        run: bunx napi build --release --platform --target ${{ matrix.target }}

      - name: Upload bindings
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/agent-transport-node/agent-transport.*.node
          retention-days: 1

  build-node:
    if: always()
    needs: [changes, run-build]
    runs-on: ubuntu-latest
    steps:
      - name: Passed
        if: needs.run-build.result == 'success' || needs.run-build.result == 'skipped'
        run: echo "Build passed or skipped (docs-only change)"
      - name: Failed
        if: needs.run-build.result == 'failure' || needs.run-build.result == 'cancelled'
        run: exit 1
