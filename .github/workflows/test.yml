name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - '**'
              - '!README.md'
              - '!LICENSE'
              - '!docs/**'
              - '!examples/**'
              - '!.claude/**'

  run-tests:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.0

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test

      - name: Run tests with audio processing
        run: cargo test --features audio-processing

      - name: Run tests with audio streaming
        run: cargo test --features audio-stream

  test:
    if: always()
    needs: [changes, run-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Passed
        if: needs.run-tests.result == 'success' || needs.run-tests.result == 'skipped'
        run: echo "Tests passed or skipped (docs-only change)"
      - name: Failed
        if: needs.run-tests.result == 'failure' || needs.run-tests.result == 'cancelled'
        run: exit 1
