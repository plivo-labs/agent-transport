name: Publish Python SDK

on:
  workflow_run:
    workflows: ["Build Python"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      run-id:
        description: 'Build workflow run ID to publish from'
        required: true

permissions:
  contents: write
  actions: read

jobs:
  check:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      version: ${{ steps.check.outputs.version }}
      run-id: ${{ steps.check.outputs.run-id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check for release label on merged PR
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-publish=true" >> $GITHUB_OUTPUT
            echo "run-id=${{ inputs.run-id }}" >> $GITHUB_OUTPUT
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            LABELS=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
              --jq 'if length > 0 then .[0].labels[].name else empty end' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "release-python-sdk"; then
              echo "should-publish=true" >> $GITHUB_OUTPUT
            else
              echo "should-publish=false" >> $GITHUB_OUTPUT
              echo "No release-python-sdk label found, skipping"
            fi
            echo "run-id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          fi
          VERSION=$(grep '^version' crates/agent-transport-python/pyproject.toml \
            | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing agent-transport v$VERSION to PyPI"

  publish:
    needs: check
    if: needs.check.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ needs.check.outputs.run-id }}
          github-token: ${{ github.token }}
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  release:
    needs: [check, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          SDK_PREFIX="python"
          SDK_LABEL="python"
          TAG="${SDK_PREFIX}-v${VERSION}"

          # Find previous tag for this SDK
          PREV_TAG=$(git tag --list "${SDK_PREFIX}-v*" --sort=-v:refname | head -1)
          BASE=${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}

          # Extract PR numbers from commits in range
          PR_NUMBERS=$(git log "$BASE"..HEAD --oneline | grep -oP '\(#\K[0-9]+(?=\))' | sort -u || true)

          # Filter PRs by label and build notes
          NOTES=""
          for pr in $PR_NUMBERS; do
            LABELS=$(gh pr view "$pr" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -qE "^(core|${SDK_LABEL})$"; then
              TITLE=$(gh pr view "$pr" --json title --jq '.title')
              AUTHOR=$(gh pr view "$pr" --json author --jq '.author.login')
              NOTES+="- ${TITLE} (#${pr}) @${AUTHOR}"$'\n'
            fi
          done

          # Fallback if no labeled PRs found
          if [ -z "$NOTES" ]; then
            NOTES="Release ${SDK_PREFIX} v${VERSION}"
            if [ -n "$PREV_TAG" ]; then
              NOTES+=$'\n\n'"**Full changelog**: ${PREV_TAG}...${TAG}"
            fi
          fi

          gh release create "$TAG" \
            --target "$TARGET_SHA" \
            --title "Python SDK v${VERSION}" \
            --notes "$NOTES"
