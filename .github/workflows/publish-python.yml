name: Publish Python SDK

on:
  workflow_run:
    workflows: ["Build Python"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  check:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check for release label on merged PR
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          LABELS=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
            --jq 'if length > 0 then .[0].labels[].name else empty end' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "release-python-sdk"; then
            echo "should-publish=true" >> $GITHUB_OUTPUT
            VERSION=$(grep '^version' crates/agent-transport-python/pyproject.toml \
              | head -1 | sed 's/.*"\(.*\)"/\1/')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Publishing agent-transport v$VERSION to PyPI"
          else
            echo "should-publish=false" >> $GITHUB_OUTPUT
            echo "No release-python-sdk label found, skipping"
          fi

  publish:
    needs: check
    if: needs.check.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
